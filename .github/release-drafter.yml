name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
no-changes-template: '- No categorized changes for this release.'

version-template: '$MAJOR.$MINOR.$PATCH'
version-resolver:
  major:
    labels:
      - 'changelog:breaking'
  minor:
    labels:
      - 'changelog:feature'
  patch:
    labels:
      - 'changelog:fix'
      - 'changelog:performance'
      - 'changelog:docs'
  default: patch

categories:
  - title: 'Breaking Changes'
    labels:
      - 'changelog:breaking'
  - title: 'Features'
    labels:
      - 'changelog:feature'
  - title: 'Fixes'
    labels:
      - 'changelog:fix'
  - title: 'Performance'
    labels:
      - 'changelog:performance'
  - title: 'Documentation'
    labels:
      - 'changelog:docs'

exclude-labels:
  - 'changelog:internal'
  - 'skip-changelog'

template: |
  ## Changes
  $CHANGES

  ## Contributors
  $CONTRIBUTORS
