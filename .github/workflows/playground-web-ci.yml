name: Playground Web Build

on:
  pull_request:
    branches:
      - stable/playground/**
      - alpha/playground/**
      - beta/playground/**
      - next/playground/**
      - latest/playground/**
    paths:
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'crates/**'
      - 'scripts/**'
      - '.github/workflows/playground-web-ci.yml'

  push:
    branches:
      - stable/playground/**
      - alpha/playground/**
      - beta/playground/**
      - next/playground/**
      - latest/playground/**
    paths:
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'crates/**'
      - 'scripts/**'
      - '.github/workflows/playground-web-ci.yml'

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: playground-web-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build web artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install script dependencies
        working-directory: scripts
        run: bun install --frozen-lockfile

      - name: Apply version from release branch
        id: version
        working-directory: scripts
        run: bun cmd github set-version --component playground

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.122 --locked

      - name: Build playground WebAssembly module
        run: cargo build -p galfus-playground --target wasm32-unknown-unknown --features wasm --release

      - name: Generate web bindings
        run: |
          wasm-bindgen \
            --target web \
            --out-dir dist/playground-web \
            --out-name galfus_playground \
            build/cargo-target/wasm32-unknown-unknown/release/galfus_playground.wasm

      - name: Show generated web artifact
        run: ls -lh dist/playground-web

      - name: Upload playground web artifact
        uses: actions/upload-artifact@v7
        with:
          name: galfus-playground-web-${{ steps.version.outputs.tag }}-${{ steps.version.outputs.version }}-${{ github.sha }}
          path: dist/playground-web
          if-no-files-found: error
          retention-days: 14
