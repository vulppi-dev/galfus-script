name: Stale Issues and PRs

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Mark and close stale items
        uses: actions/stale@v9
        with:
          stale-issue-message: "This issue has been marked as stale due to inactivity."
          close-issue-message: "Closing this issue due to prolonged inactivity. Reopen if it is still relevant."
          stale-pr-message: "This PR has been marked as stale due to inactivity."
          close-pr-message: "Closing this PR due to prolonged inactivity. Reopen when updates are available."

          days-before-issue-stale: 45
          days-before-issue-close: 14
          days-before-pr-stale: 21
          days-before-pr-close: 14

          exempt-issue-labels: "pinned,security,critical,priority/high,never-stale"
          exempt-pr-labels: "pinned,security,critical,priority/high,never-stale"
