name: PR Labels and Validate

on:
  pull_request_target:
    branches:
      - main
      - feat/**
      - fix/**
      - refactor/**
      - docs/**
      - test/**
      - chore/**
      - stable/**
      - alpha/**
      - beta/**
      - next/**
      - latest/**
    types:
      - opened
      - synchronize
      - edited
      - ready_for_review
      - labeled
      - unlabeled

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Label PR by changed files
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true

      - name: Label PR size
        uses: codelytv/pr-size-labeler@v1
        with:
          xs_label: size/xs
          xs_max_size: '30'
          s_label: size/sm
          s_max_size: '100'
          m_label: size/md
          m_max_size: '300'
          l_label: size/lg
          l_max_size: '800'
          xl_label: size/xl
          fail_if_xl: 'false'
          github_api_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync changelog labels from checked checklist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun scripts/github/sync-changelog-labels.ts

  validate:
    needs:
      - labels
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Validate PR policy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun scripts/github/validate-pr-policy.ts
