name: VSCode Extension CI

on:
  pull_request:
    branches:
      - stable/editor/**
      - alpha/editor/**
      - beta/editor/**
      - next/editor/**
      - latest/editor/**
    paths:
      - 'editors/**'
      - 'scripts/github/prepare-component-version.ts'
      - '.github/workflows/editors-ci.yml'

  push:
    branches:
      - stable/editor/**
      - alpha/editor/**
      - beta/editor/**
      - next/editor/**
      - latest/editor/**
    paths:
      - 'editors/**'
      - 'scripts/github/prepare-component-version.ts'
      - '.github/workflows/editors-ci.yml'

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: editors-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate and package
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: editors/vscode

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Apply version from release branch
        id: version
        run: bun ../../scripts/github/prepare-component-version.ts editor

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate extension
        run: bun run check

      - name: Inspect package contents
        run: bun run pkg:ls

      - name: Generate VSIX
        run: bun run pkg

      - name: Show generated package
        run: ls -lh dist

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: galfus-language-vsix-${{ steps.version.outputs.channel }}-${{ steps.version.outputs.version }}-${{ github.sha }}
          path: editors/vscode/dist/*.vsix
          if-no-files-found: error
          retention-days: 14
